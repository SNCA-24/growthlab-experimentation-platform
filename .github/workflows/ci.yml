name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e .

      - name: Compile sources
        run: python -m compileall src scripts

      - name: Validate config contracts
        run: python -m pytest tests/smoke/test_config_smoke.py -q

      - name: Run end-to-end smoke path
        run: python scripts/run_smoke_tests.py

